{{- if .Values.zcashd.enabled }}
# Headless service for stable per-replica DNS (zcashd-0.zcashd-service.<ns>.svc).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.zcashd.name }}-service
spec:
  clusterIP: None
  selector:
    app: {{ .Values.zcashd.name }}
  ports:
    - port: {{ if .Values.zcashd.testnet }}18232{{ else }}8232{{ end }}
      targetPort: {{ if .Values.zcashd.testnet }}18232{{ else }}8232{{ end }}
      protocol: TCP
      name: rpc
{{- end }}
