{{- if .Values.zebra.enabled }}
# Headless service for stable per-replica DNS (zebra-0.zebra-service.<ns>.svc).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.zebra.name }}-service
spec:
  clusterIP: None
  selector:
    app: {{ .Values.zebra.name }}
  ports:
    - port: {{ if .Values.zebra.testnet }}18232{{ else }}8232{{ end }}
      targetPort: {{ if .Values.zebra.testnet }}18232{{ else }}8232{{ end }}
      protocol: TCP
      name: rpc
{{- end }}
