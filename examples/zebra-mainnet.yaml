# Zebra full node + lightwalletd on mainnet (the recommended setup).
zebra:
  enabled: true
  # Optionally bootstrap chain state from a snapshot (restore is safe to interrupt).
  initSnapshot:
    enabled: false

lightwalletd:
  rpcService: zebra
  volumes:
    data:
      size: 40Gi
  ingress:
    enabled: true
    className: nginx
    hosts:
      - mainnet-example.your.domain   # <-- point this DNS record at your ingress LB
    tls:
      enabled: true
      clusterIssuer: letsencrypt-prod  # requires cert-manager + this ClusterIssuer

# RPC is only accessible from within the cluster, not exposed to the internet
rpc:
  credentials:
    rpcUser: changeThisPossibly
    rpcPassword: toYourLiking123
