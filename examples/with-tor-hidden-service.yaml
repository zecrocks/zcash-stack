# Zebra + lightwalletd (public, via Ingress) + zaino (exposed only over Tor).
zebra:
  enabled: true
  initSnapshot:
    enabled: false

zcashd:
  enabled: false

lightwalletd:
  enabled: true
  rpcService: zebra
  volumes:
    data:
      size: 40Gi
  ingress:
    enabled: true
    className: nginx
    hosts:
      - mainnet-example.your.domain
    tls:
      enabled: true
      clusterIssuer: letsencrypt-prod

zaino:
  enabled: true
  rpcService: zebra
  volumes:
    data:
      size: 40Gi
  # Exposed via Tor below, not via a public Ingress.
  ingress:
    enabled: false

# Expose Zaino's gRPC as a Tor hidden service (.onion). Useful when the cluster
# has no public IP/domain.
tor:
  enabled: true
  # Which service to expose through Tor: 'zaino' or 'lightwalletd'
  targetService: zaino
  hiddenServicePort: 80
  volumes:
    data:
      size: 1Gi

# RPC is only accessible from within the cluster, not exposed to the internet
rpc:
  credentials:
    rpcUser: changeThisPossibly
    rpcPassword: toYourLiking123
