# Zcashd full node + lightwalletd on mainnet.
zcashd:
  enabled: true
  initSnapshot:
    enabled: false

zebra:
  enabled: false

lightwalletd:
  rpcService: zcashd
  ingress:
    enabled: true
    className: nginx
    hosts:
      - mainnet-example.your.domain
    tls:
      enabled: true
      clusterIssuer: letsencrypt-prod

# RPC is only accessible from within the cluster, not exposed to the internet
rpc:
  credentials:
    rpcUser: changeThisPossibly
    rpcPassword: toYourLiking123
