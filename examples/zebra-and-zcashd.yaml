# Run both Zebra and Zcashd as backends, with lightwalletd in front of Zebra.
zebra:
  enabled: true
  initSnapshot:
    enabled: false

zcashd:
  enabled: true
  initSnapshot:
    enabled: false

lightwalletd:
  # Change rpcService to "zcashd" and run "helm upgrade" if Zebra has a major issue.
  rpcService: zebra
  volumes:
    data:
      size: 40Gi
  ingress:
    enabled: true
    className: nginx
    hosts:
      - mainnet-example.your.domain
    tls:
      enabled: true
      clusterIssuer: letsencrypt-prod

# RPC is only accessible from within the cluster, not exposed to the internet
rpc:
  credentials:
    rpcUser: changeThisPossibly
    rpcPassword: toYourLiking123
