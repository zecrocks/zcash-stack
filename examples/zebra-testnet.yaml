# Zebra full node + lightwalletd on testnet.
zebra:
  enabled: true
  testnet: true
  volumes:
    data:
      size: 50Gi
  initSnapshot:
    enabled: false
    url: https://link.storjshare.io/s/jvbcllf2rpohtqhwiget5pkcvyca/nodedumps/zec/zebra-testnet-2024-04-22.tar?download=1

zcashd:
  enabled: false

lightwalletd:
  rpcService: zebra
  volumes:
    data:
      size: 40Gi
  ingress:
    enabled: true
    className: nginx
    hosts:
      - testnet-example.your.domain
    tls:
      enabled: true
      clusterIssuer: letsencrypt-prod
  # Optionally enable gRPC logging for troubleshooting. User IPs will not be visible.
  # additionalArgs:
  #   - --grpc-logging-insecure

# RPC is only accessible from within the cluster, not exposed to the internet
rpc:
  credentials:
    rpcUser: changeThisPossibly
    rpcPassword: toYourLiking123
