# cert-manager ClusterIssuers for Let's Encrypt TLS. Cluster-scoped, not templated.
# Install cert-manager first, then: kubectl apply -f cluster-issuer.yaml
# Reference via <service>.ingress.tls.clusterIssuer.
# TIP: validate with letsencrypt-staging first, then switch to letsencrypt-prod.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com            # <-- CHANGE THIS
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx              # must match your ingress controller class
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: you@example.com            # <-- CHANGE THIS
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
