# Zcashd full node + lightwalletd on testnet.
zcashd:
  enabled: true
  testnet: true
  initSnapshot:
    enabled: false

zebra:
  enabled: false

lightwalletd:
  rpcService: zcashd
  ingress:
    enabled: true
    className: nginx
    hosts:
      - testnet-example.your.domain
    tls:
      enabled: true
      clusterIssuer: letsencrypt-prod
  # Optionally enable gRPC logging for troubleshooting. User IPs will not be visible.
  # additionalArgs:
  #   - --grpc-logging-insecure

# RPC is only accessible from within the cluster, not exposed to the internet
rpc:
  credentials:
    rpcUser: changeThisPossibly
    rpcPassword: toYourLiking123
